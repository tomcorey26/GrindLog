name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            1. Run `git diff origin/main...HEAD` to see all changes
            2. Read the changed files for full context
            3. Review for: bugs, security issues, performance problems, code style, and correctness
            4. Post your review using `gh pr review ${{ github.event.pull_request.number }}` with either --approve or --comment flag and a --body containing your review

            Keep the review concise and actionable. If the code looks good, approve it with a brief note on what you checked.
          claude_args: '--allowedTools "Read,Glob,Grep,Bash(gh pr *),Bash(gh api *),Bash(git diff *),Bash(git log *),Bash(git show *)"'

